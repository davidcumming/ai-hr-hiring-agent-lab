# Server-side, source-controlled lab configuration (slice-e1 + readiness pack).
# Git history is the change record (slice spec §17). No secrets exist in this
# file or anywhere in the repo. Tests exercise non-default states by
# constructing the app with an explicit config object, never by editing this
# committed file.

[rigor]
# standard | high_impact | escalated  (BR-001/BR-003)
default_mode = "high_impact"

[escalation]
# record_only | auto_escalate  (BR-004/BR-005/BR-006; OQ-002 decided: implemented)
policy = "record_only"

[provider]
# Readiness provider registry:
#   deterministic_mock (default, the only functional provider)
#   foundry_project_responses | foundry_prompt_agent | foundry_hosted_agent
#     (scaffold-only; fail closed; blocked by HRHA_PROVIDER_KILL_SWITCH=true
#      and by HRHA_ENABLE_LIVE_AZURE unset/false; live wiring is human-gated
#      by the deferred ADR — these IDs decide nothing)
provider_id = "deterministic_mock"
# Legacy family value kept for audit-record compatibility; must agree with
# provider_id (none <-> deterministic_mock; foundry_agents <-> foundry_*).
ai_backend_type = "none"

[persistence]
# Local store root (gitignored). Overridable via explicit config object in tests.
root = "var/lab-data"

[storage]
# local_filesystem (default) | azure_blob (Blob-backed record/artifact
# persistence for explicit hosted/live-storage paths only). Ordinary local app
# construction reads this file only and does not overlay HRHA_STORAGE_BACKEND.
backend = "local_filesystem"

[storage.azure]
# PLACEHOLDERS ONLY — empty by default; identity-based auth intended for the
# live path (no connection strings, keys, or SAS tokens, ever). Table/Queue
# endpoints are used only by explicit guarded workflow-storage paths.
account_url = ""
container = ""
table_endpoint = ""
queue_endpoint = ""

[workflow_storage]
# local (default) | azure (guarded E8 Workflow Table/Blob/Queue adapter).
# Ordinary local app construction reads this file only and does not overlay
# HRHA_WORKFLOW_STORAGE_BACKEND.
backend = "local"
# Optional Azure Blob container override for workflow artifacts. Empty means
# use storage.azure.container on the explicit Azure path.
blob_container = ""
# Optional alphanumeric prefix for all workflow Table names on the explicit
# Azure path. Empty means use the E7 logical table names directly.
table_prefix = ""
# Local queue file name and explicit Azure Queue name default.
queue_name = "workflow-jobs"
