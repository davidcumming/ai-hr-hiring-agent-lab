# Minimal CI (FR-014): run the deterministic test suite on every PR.
# No cloud credentials, no network beyond checkout + package install.
name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          # Pinned to the slice's supported interpreter (plan deviation note in
          # pyproject.toml: 3.10 instead of the planned 3.12).
          python-version: "3.10"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Run deterministic suite
        run: pytest -q
      - name: OpenAPI drift check
        run: python3 scripts/export_openapi.py --check
